name: TinyTask
options:
  bundleIdPrefix: com.tinytask
  deploymentTarget:
    macOS: "15.0"
  xcodeVersion: "16.0"

packages:
  TinyKit:
    path: Packages/TinyKit

targets:
  TinyTask:
    type: application
    platform: macOS
    sources:
      - path: Sources/TinyTask
        excludes:
          - "Resources"
      - path: Sources/TinyTask/Resources/Assets.xcassets
        buildPhase: resources
      - path: Sources/TinyTask/Resources/AppIcon.icon
        buildPhase: resources
    info:
      path: Sources/TinyTask/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDocumentTypes:
          - CFBundleTypeName: Todo List
            CFBundleTypeRole: Editor
            LSHandlerRank: Default
            LSItemContentTypes:
              - com.tinytask.todo
            CFBundleTypeExtensions:
              - todo
          - CFBundleTypeName: Markdown Document
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - net.daringfireball.markdown
            CFBundleTypeExtensions:
              - md
          - CFBundleTypeName: Plain Text
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.plain-text
            CFBundleTypeExtensions:
              - txt
              - text
        LSApplicationCategoryType: public.app-category.productivity
        UTImportedTypeDeclarations:
          - UTTypeIdentifier: com.tinytask.todo
            UTTypeDescription: Todo List
            UTTypeConformsTo:
              - public.plain-text
            UTTypeTagSpecification:
              public.filename-extension:
                - todo
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tinytask.app
        PRODUCT_NAME: "TinyTask"
        MARKETING_VERSION: "1.3.1"
        CURRENT_PROJECT_VERSION: "4"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        ASSETCATALOG_COMPILER_ALTERNATE_APPICON_NAMES: ""
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        DEVELOPMENT_TEAM: 992N457T8D
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: TinyTask.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: NO
        INSTALL_PATH: /Applications
    dependencies:
      - package: TinyKit
        product: TinyKit

schemes:
  TinyTask:
    build:
      targets:
        TinyTask: all
