name: TinyTask
options:
  bundleIdPrefix: com.tinytask
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"

packages:
  TinyKit:
    path: Packages/TinyKit

targets:
  TinyTask:
    type: application
    platform: macOS
    sources:
      - path: Sources/TinyTask
        excludes:
          - "Resources"
      - path: Sources/TinyTask/Resources/Assets.xcassets
        buildPhase: resources
      - path: Sources/TinyTask/Resources/AppIcon.icon
        buildPhase: resources
    info:
      path: Sources/TinyTask/Info.plist
      properties:
        CFBundleDocumentTypes:
          - CFBundleTypeName: Task List
            CFBundleTypeRole: Editor
            LSHandlerRank: Alternate
            LSItemContentTypes:
              - public.plain-text
            CFBundleTypeExtensions:
              - md
              - txt
              - text
              - todo
        LSApplicationCategoryType: public.app-category.productivity
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.tinytask.app
        PRODUCT_NAME: "TinyTask"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: YES
        ASSETCATALOG_COMPILER_ALTERNATE_APPICON_NAMES: ""
        INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.productivity"
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        SWIFT_VERSION: "5.9"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        DEVELOPMENT_TEAM: 992N457T8D
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_ENTITLEMENTS: TinyTask.entitlements
        ENABLE_HARDENED_RUNTIME: YES
        SKIP_INSTALL: NO
        INSTALL_PATH: /Applications
    dependencies:
      - package: TinyKit
        product: TinyKit
