name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Show Xcode version
        run: xcodebuild -version
      - name: Build TinyTask
        run: xcodebuild clean build -project TinyTask.xcodeproj -scheme TinyTask -configuration Release -derivedDataPath /tmp/tinybuild/tinytask CODE_SIGN_IDENTITY="-"
