name: Build

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Show Xcode version
        run: xcodebuild -version
      - name: Install XcodeGen
        run: |
          brew list xcodegen >/dev/null 2>&1 || HOMEBREW_NO_AUTO_UPDATE=1 brew install xcodegen
          xcodegen --version
      - name: Generate Xcode project
        run: xcodegen generate --spec project.yml
      - name: Build TinyTask
        run: xcodebuild clean build -project TinyTask.xcodeproj -scheme TinyTask -configuration Release -derivedDataPath /tmp/tinybuild/tinytask CODE_SIGN_IDENTITY="-"
